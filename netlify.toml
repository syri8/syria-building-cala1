[build]
  publish = "."
  command = "echo 'Static site'"

[[redirects]]
  from = "/calculator"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/floor-plan"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/prices"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=15552000"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=15552000"
